services:
  mongodb:
    image: mongo:8.0
    container_name: phield-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  phield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phield-service
    ports:
      - "8443:8443"
    environment:
      - PHIELD_MONGO_URI=mongodb://mongodb:27017/phield
      - PHIELD_ALERT_THRESHOLD=0.2
      - PHIELD_PORT=8443
      - PHIELD_CERT_FILE=/root/cert.pem
      - PHIELD_KEY_FILE=/root/key.pem
      - PHIELD_SLACK_WEBHOOK_URL=
      - PHIELD_PAGERDUTY_ROUTING_KEY=
      - PHIELD_PAGERDUTY_SEVERITY=critical
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
